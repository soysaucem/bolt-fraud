name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump type
        required: false
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest

    # Skip release commits to avoid infinite loop
    if: "!startsWith(github.event.head_commit.message, 'chore: release v')"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version bump
        id: bump
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "type=${{ inputs.bump }}" >> "$GITHUB_OUTPUT"
          else
            # Auto-detect from commit messages since last tag
            LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
            if [ -z "$LAST_TAG" ]; then
              COMMITS=$(git log --oneline)
            else
              COMMITS=$(git log --oneline "${LAST_TAG}..HEAD")
            fi

            if echo "$COMMITS" | grep -qi "BREAKING CHANGE\|^.*!:"; then
              echo "type=major" >> "$GITHUB_OUTPUT"
            elif echo "$COMMITS" | grep -qi "^[a-f0-9]* feat"; then
              echo "type=minor" >> "$GITHUB_OUTPUT"
            else
              echo "type=patch" >> "$GITHUB_OUTPUT"
            fi
          fi
          echo "Bump type: $(cat "$GITHUB_OUTPUT" | grep type | cut -d= -f2)"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install dependencies
        run: npm ci

      # Typecheck all packages
      - name: Typecheck client
        run: npx tsc --noEmit -p packages/client/tsconfig.json

      - name: Typecheck server
        run: npx tsc --noEmit -p packages/server/tsconfig.json

      - name: Build server (adapter dependency)
        run: npx tsup
        working-directory: packages/server

      - name: Typecheck NestJS adapter
        run: npx tsc --noEmit -p packages/adapter-nestjs/tsconfig.json

      - name: Typecheck Express adapter
        run: npx tsc --noEmit -p packages/adapter-express/tsconfig.json

      # Test all packages
      - name: Test client
        run: npm test -w packages/client

      - name: Test server
        run: npm test -w packages/server

      - name: Test NestJS adapter
        run: npm test -w packages/adapter-nestjs

      - name: Test Express adapter
        run: npm test -w packages/adapter-express

      # Build all
      - name: Build all packages
        run: npm run build

      # Bump versions in all packages
      - name: Bump versions
        run: |
          NEW_VERSION=$(npm version ${{ steps.bump.outputs.type }} --no-git-tag-version --workspaces --include-workspace-root | head -1 | sed 's/^v//')
          echo "NEW_VERSION=$NEW_VERSION" >> "$GITHUB_ENV"

      # Verify publishable artifacts
      - name: Pack client
        run: npm pack --dry-run
        working-directory: packages/client

      - name: Pack server
        run: npm pack --dry-run
        working-directory: packages/server

      - name: Pack NestJS adapter
        run: npm pack --dry-run
        working-directory: packages/adapter-nestjs

      - name: Pack Express adapter
        run: npm pack --dry-run
        working-directory: packages/adapter-express

      # Commit version bump and tag
      - name: Commit and tag
        run: |
          git add -A
          git commit -m "chore: release v${NEW_VERSION}"
          git tag "v${NEW_VERSION}"
          git push origin HEAD --tags
